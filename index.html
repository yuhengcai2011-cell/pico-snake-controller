<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>Pico Arcade Pro</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --accent: #9b59b6;
            --success: #27ae60;
            --btn-size: 85px;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: white;
            overflow: hidden;
            touch-action: none; /* Prevents zooming/scrolling */
        }

        /* Snake Pattern Background */
        .snake-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(#2ecc71 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.1;
            z-index: -1;
        }

        /* Dedicated Connect Screen */
        #connect-screen {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; transition: opacity 0.5s ease;
        }

        .arcade-logo {
            font-size: 3rem; margin-bottom: 10px; text-shadow: 0 0 20px var(--accent);
            letter-spacing: 5px; font-weight: 900;
        }

        /* Snake Icon Placeholder */
        .snake-icon {
            width: 120px; height: 120px;
            background: linear-gradient(45deg, #2ecc71, #27ae60);
            border-radius: 20px; margin: 20px;
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.4);
            display: flex; align-items: center; justify-content: center;
            font-size: 4rem;
        }

        #connectBtn {
            padding: 18px 45px; font-size: 1.2rem; border-radius: 50px;
            border: none; background: var(--accent); color: white;
            cursor: pointer; font-weight: bold; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #connectBtn:active { transform: scale(0.9); }

        /* Landscape Controller Screen */
        #game-view {
            display: none; /* Hidden until connected */
            height: 100vh;
            justify-content: center; align-items: center;
        }

        .landscape-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 20px;
            height: 80vh; aspect-ratio: 1/1;
        }

        .btn {
            width: var(--btn-size); height: var(--btn-size);
            border-radius: 100%; border: none; font-weight: bold;
            font-size: 1.1rem; color: white;
            box-shadow: 0 8px 0 #222; /* Arcade button 3D effect */
            transition: 0.1s;
        }

        .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #111; }

        .up { grid-column: 2; grid-row: 1; background: #e74c3c; }
        .left { grid-column: 1; grid-row: 2; background: #3498db; }
        .right { grid-column: 3; grid-row: 2; background: #f1c40f; color: black; }
        .down { grid-column: 2; grid-row: 3; background: #2ecc71; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="snake-bg"></div>

    <!-- Splash Screen -->
    <div id="connect-screen">
        <div class="arcade-logo">SNAKE</div>
        <div class="snake-icon">🐍</div>
        <p>Ready to Play?</p>
        <button id="connectBtn" onclick="connect()">PRESS START</button>
    </div>

    <!-- Landscape Controller -->
    <div id="game-view">
        <div class="landscape-grid">
            <button class="btn up" ontouchstart="send('UP')">▲</button>
            <button class="btn left" ontouchstart="send('LEFT')">◀</button>
            <button class="btn right" ontouchstart="send('RIGHT')">▶</button>
            <button class="btn down" ontouchstart="send('DOWN')">▼</button>
        </div>
    </div>

    <script>
        let char;
        const s_uuid = '0000181a-0000-1000-8000-00805f9b34fb';
        const c_uuid = '00002a6e-0000-1000-8000-00805f9b34fb';

        async function connect() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'Pico-Snake' }],
                    optionalServices: [s_uuid]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(s_uuid);
                char = await service.getCharacteristic(c_uuid);
                
                // Switch Views
                document.getElementById('connect-screen').classList.add('hidden');
                document.getElementById('game-view').style.display = 'flex';
                
            } catch (e) {
                console.log(e);
                alert("Connection failed: " + e);
            }
        }

        async function send(cmd) {
            if (char) {
                try {
                    // Optimized for speed
                    await char.writeValueWithoutResponse(new TextEncoder().encode(cmd));
                } catch (e) {
                    console.log("Send failed", e);
                }
            }
        }
    </script>
</body>
</html>
